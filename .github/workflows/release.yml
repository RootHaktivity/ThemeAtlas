name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  python-dist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m pip install -r requirements.txt

      - name: Compile gate
        run: python -m compileall -q theme_manager

      - name: Run tests
        run: python -m unittest discover -s tests -p "test_*.py" -v

      - name: Build distribution artifacts
        run: python -m build

      - name: Upload wheel/sdist
        uses: actions/upload-artifact@v4
        with:
          name: release-dist
          path: dist/*

  appimage:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build AppDir
        run: PYTHON_BIN=python bash scripts/build_appimage.sh

      - name: Build AppImage
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          APPIMAGE="dist/ThemeAtlas-${VERSION}-x86_64.AppImage"
          mkdir -p build/tools
          mkdir -p dist
          curl -L -o build/tools/appimagetool-x86_64.AppImage https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x build/tools/appimagetool-x86_64.AppImage
          ARCH=x86_64 ./build/tools/appimagetool-x86_64.AppImage --appimage-extract-and-run \
            build/appimage/ThemeAtlas.AppDir \
            "${APPIMAGE}"

      - name: Generate AppImage checksum
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          APPIMAGE="dist/ThemeAtlas-${VERSION}-x86_64.AppImage"
          sha256sum "${APPIMAGE}" > "${APPIMAGE}.sha256"

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: release-appimage
          path: |
            dist/ThemeAtlas-*-x86_64.AppImage
            dist/ThemeAtlas-*-x86_64.AppImage.sha256

  flatpak:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Flatpak toolchain
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if sudo apt-get update; then
              break
            fi
            if [ "${attempt}" -eq 3 ]; then
              echo "apt-get update failed after ${attempt} attempts"
              exit 1
            fi
            echo "apt-get update failed, retrying (${attempt}/3)..."
          done

          for attempt in 1 2 3; do
            if sudo apt-get install -y --no-install-recommends flatpak flatpak-builder; then
              break
            fi
            if [ "${attempt}" -eq 3 ]; then
              echo "apt-get install flatpak toolchain failed after ${attempt} attempts"
              exit 1
            fi
            echo "flatpak toolchain install failed, retrying (${attempt}/3)..."
          done

          flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Build Flatpak bundle
        run: |
          set -e
          mkdir -p dist
          flatpak-builder --force-clean --install-deps-from=flathub --repo=build/flatpak-repo build/flatpak-build packaging/flatpak/io.themeatlas.ThemeAtlas.yaml
          flatpak build-bundle build/flatpak-repo dist/ThemeAtlas.flatpak io.themeatlas.ThemeAtlas

      - name: Upload Flatpak
        uses: actions/upload-artifact@v4
        with:
          name: release-flatpak
          path: dist/ThemeAtlas.flatpak

  release:
    needs: [python-dist, appimage, flatpak]
    runs-on: ubuntu-latest
    steps:
      - name: Download wheel/sdist
        uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: dist

      - name: Download AppImage
        uses: actions/download-artifact@v4
        with:
          name: release-appimage
          path: dist

      - name: Download Flatpak
        uses: actions/download-artifact@v4
        with:
          name: release-flatpak
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*
